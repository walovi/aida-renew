name: Run Aida Renew

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-private-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4

      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/aida_renew_private
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          if [ -f private/requirements.txt ]; then
            pip install -r private/requirements.txt
          fi

      - name: Run private script
        env:
          PYTHONIOENCODING: utf-8
        run: python private/aida-renew.py
