name: Aida Auto Renew

on:
  push:
    branches:
      - main
  schedule:
    # 每天北京时间早上 8:30 执行 (UTC 0:30)
    - cron: "30 0 * * *"
  workflow_dispatch:

jobs:
  renew:
    runs-on: ubuntu-latest
    env:
      IS_PROXY: true
      PROXY_SERVER: socks5://127.0.0.1:1080
      PYTHONIOENCODING: utf-8
      EMAIL: ${{ secrets.EMAIL }}
      PASSWORD: ${{ secrets.PASSWORD }}
      TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}

    steps:
      - name: 📦 检出代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📥 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libpango-1.0-0 libcairo2 libasound2

      - name: 🌐 配置代理
        run: |
          # 在此替换为你的代理地址和端口
          # 示例: socks5://127.0.0.1:1080
          # 如果不需要代理，可将 IS_PROXY 设为 false
          echo "代理配置完成 (如需修改请编辑 yml 文件)"

      - name: 📚 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install seleniumbase requests
          sb install chromedriver

      - name: 🚀 运行续期脚本
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python3 private/aida_renew.py
