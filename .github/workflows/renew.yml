name: Run Aida Renew

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 1

  run-private-script:
    needs: cleanup
    runs-on: ubuntu-latest

    steps:
      - name: Checkout public repo
        uses: actions/checkout@v5

      - name: Checkout private repo
        uses: actions/checkout@v5
        with:
          repository: ${{ github.repository_owner }}/aida_renew_private
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      - name: ⚙ 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🛠️ 安装系统依赖和 Python 依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb x11-utils xdotool scrot fonts-noto-cjk
          pip install requests seleniumbase
          seleniumbase install chromedriver

      - name: ⚙ 设置代理 (sing-box)
        continue-on-error: true
        env:
          NODE_LINK: ${{ secrets.PROXY_SERVER }}
        run: |
          bash <(wget -qO- https://main.ssss.nyc.mn/setup_proxy.sh)

      - name: 🚀 运行续期脚本
        env:
          PYTHONIOENCODING: utf-8
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            python3 private/aida_renew.py

      - name: 🧹 清理旧的工作流运行记录
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          runs=$(gh run list --workflow="${{ github.workflow }}" --limit=100 --json databaseId --jq '.[].databaseId')
          count=0
          for run_id in $runs; do
            count=$((count + 1))
            if [ $count -gt 1 ]; then
              echo "删除运行记录: $run_id"
              gh run delete $run_id || true
            fi
          done
